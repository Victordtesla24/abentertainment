name: Docs Quality

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/docs-quality.yml"
      - ".markdownlint-cli2.jsonc"
      - ".lycheeignore"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-quality.yml"
      - ".markdownlint-cli2.jsonc"
      - ".lycheeignore"

permissions:
  contents: read

concurrency:
  group: docs-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-quality:
    name: Markdown and Links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

      - name: Validate links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --root-dir .
            --no-progress
            --accept 200,206,429
            --max-retries 3
            --retry-wait-time 2
            "./**/*.md"
